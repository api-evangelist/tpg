description: TPG Inc. is a global alternative-asset manager. It does not operate a commercial public API
  business; "API plans/pricing" do not exist for TPG as a vendor. Investor relations and limited-partner
  reporting are handled through bespoke channels, not through a developer-priced API. This artifact captures
  that with a single Contact Sales / Investor Relations entry.
